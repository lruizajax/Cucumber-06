name: Cucumber BDD Test Suite

on:
  push:
    branches: [ "master"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

      # 1. Descargar código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Ejecutar pruebas
      - name: Run Cucumber Tests
        run: mvn clean verify -Dcucumber.filter.tags="@regression"

      # 4. Instalar Allure CLI
      - name: Install Allure
        run: |
          wget https://github.com/allure-framework/allure2/releases/latest/download/allure-2.35.0.tgz
          tar -zxvf allure-2.35.0.tgz
          sudo mv allure-2.35.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # 5. Generar reporte Allure
      - name: Generate Allure Report
        if: always()
        run: |
          allure generate target/allure-results \
            --clean \
            -o target/allure-report

      # 6. Subir reportes Cucumber
      - name: Upload Cucumber Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports
          path: |
            target/cucumber-reports/
            target/cucumber.json
            target/cucumber.xml

      # 7. Subir reporte Allure
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report/