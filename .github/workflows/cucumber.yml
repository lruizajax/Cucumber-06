name: Cucumber BDD Test Suite

on:
  push:
    branches: [ "master"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

      # 1. Descargar código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Java
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
            java-version: '21'
            distribution: 'temurin'

      # 3. descargar dependencias de Maven
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
            path: ~/.m2
            key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
            restore-keys: |
              maven-${{ runner.os }}

      # 4. Instalar Allure CLI
      - name: Install Allure
        run: |
                ALLURE_VERSION=2.24.0
                wget https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
                tar -zxvf allure-${ALLURE_VERSION}.tgz
                echo "$PWD/allure-${ALLURE_VERSION}/bin" >> $GITHUB_PATH

      # 5. Verificar instalación de Allure
      - name: verify allure installation
        run: allure --version

      # 6. Ejecutar pruebas
      - name: Run Cucumber Tests
        run: mvn clean verify -Dcucumber.filter.tags="@regression"

      # 7. Generar reporte Allure
      - name: Generate Allure Report
        if: always()
        run: |
          allure generate target/allure-results \
            --clean \
            -o target/allure-report

      # 8. Subir reportes Cucumber
      - name: Upload Cucumber Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports
          path: |
            target/cucumber-reports/
            target/cucumber-reports/cucumber.json
            target/cucumber-reports/cucumber.xml

      # 9. Subir reporte Allure
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report/